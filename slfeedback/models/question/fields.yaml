# ===================================
#  Form Field Definitions
# ===================================

fields:
    is_active:
        label: 'Показывать на сайте'
        type: switch
        default: true
        span: full
    id:
        label: 'Номер вопроса'
        type: number
        span: left
        disabled: true
    status:
        label: 'Статус вопроса'
        type: dropdown
        span: right
        comment: 'Статус обновляется автоматически по наличию ответа.'
        disabled: true

tabs:
    activeTab: 'Вопрос'
    icons:
        'Вопрос': icon-question-circle
        'Ответ': icon-commenting
        'Пользователь': icon-user
        'Специалист': icon-user-md

    fields:
        question:
            label: 'Вопрос'
            type: textarea
            size: large
            span: full
            disabled: true
            tab: 'Вопрос'

        answer:
            label: 'Ответ'
            type: richeditor
            size: large
            span: full
            tab: 'Ответ'
        answered_at:
            label: 'Дата ответа'
            type: datepicker
            mode: date
            format: d.m.Y
            firstDay: 1
            span: left
            disabled: true
            tab: 'Ответ'
        answer_email_sent_at:
            label: 'Письмо пользователю отправлено'
            type: datepicker
            mode: datetime
            format: d.m.Y
            firstDay: 1
            span: right
            disabled: true
            tab: 'Ответ'

        name:
            label: 'ФИО автора'
            type: text
            span: left
            disabled: true
            tab: 'Пользователь'
        email:
            label: 'Email автора'
            type: email
            span: right
            disabled: true
            tab: 'Пользователь'
        specialist:
            label: 'Специалист'
            type: relation
            nameFrom: name
            span: full
            comment: 'Специалист, к которому относится вопрос.'
            disabled: true
            tab: 'Специалист'
